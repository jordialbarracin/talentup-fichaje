# ============================================================
# TalentUP Fichaje — Docker Compose (local development)
# ============================================================
version: "3.9"

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: talentup
      POSTGRES_PASSWORD: talentup_secret
      POSTGRES_DB: talentup_fichaje
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U talentup -d talentup_fichaje"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://talentup:talentup_secret@db:5432/talentup_fichaje
      JWT_SECRET: ${JWT_SECRET:-cambia-este-secreto-en-produccion}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000,http://localhost:3001}
      PORT: "8000"
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
